# ================================================================
# NiveshTrack Portfolio API - Application Configuration
# ================================================================

spring:
  application:
    name: niveshtrack-portfolio

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/niveshtrack_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Nitish12345}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: NiveshTrackHikariCP
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update          # 'update' for dev; change to 'validate' for prod
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: Asia/Kolkata
    open-in-view: false

  jackson:
    date-format: yyyy-MM-dd
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Kolkata

  profiles:
    active: ${ACTIVE_PROFILE:dev}

# ================================================================
# Server Configuration
# ================================================================
server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param

# ================================================================
# JWT Configuration
# ================================================================
jwt:
  # IMPORTANT: In production, override via environment variable JWT_SECRET
  # Minimum 64 characters for HS256 compatibility
  secret: ${JWT_SECRET:bXlTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb25OaXZlc2hUcmFja1BvcnRmb2xpb0FwcDIwMjQ=}
  expiration: 86400000        # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

# ================================================================
# External Stock Price API
# ================================================================
stock-api:
  alpha-vantage:
    key: ${ALPHA_VANTAGE_KEY:demo}
    base-url: https://www.alphavantage.co/query

# ================================================================
# Logging
# ================================================================
logging:
  level:
    com.niveshtrack.portfolio: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: INFO
  file:
    name: logs/portfolio-app.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ================================================================
# Swagger / OpenAPI Documentation
# ================================================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
    try-it-out-enabled: true

---
# ================================================================
# Development Profile
# ================================================================
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: false   # set true if using H2 for tests

logging:
  level:
    com.niveshtrack.portfolio: DEBUG

---
# ================================================================
# Production Profile
# ================================================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    hikari:
      maximum-pool-size: 50
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  error:
    include-stacktrace: never

logging:
  level:
    com.niveshtrack.portfolio: INFO
    org.hibernate.SQL: WARN

---
# ================================================================
# Local Profile — runs without MySQL (H2 in-memory)
# ================================================================
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:niveshtrack;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        temp:
          use_jdbc_metadata_defaults: false
  h2:
    console:
      enabled: true

logging:
  level:
    com.niveshtrack.portfolio: DEBUG
