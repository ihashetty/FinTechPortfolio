name: CI - Frontend

on:
  push:
    branches: [main]
    paths:
      - "Portfolio/**"
  pull_request:
    branches: [main]
    paths:
      - "Portfolio/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Portfolio/package-lock.json

      - name: Install dependencies
        working-directory: Portfolio
        run: npm ci

      - name: Run tests
        working-directory: Portfolio
        run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Portfolio
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || 'http://localhost:8081' }}
            VITE_APPINFO_BASE_URL=${{ vars.VITE_APPINFO_BASE_URL || 'http://localhost:8082' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/niveshtrack-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/niveshtrack-frontend:${{ github.sha }}
