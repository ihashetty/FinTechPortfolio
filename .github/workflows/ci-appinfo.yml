name: CI - AppInfo

on:
  push:
    branches: [main]
    paths:
      - "AppInfo/**"
  pull_request:
    branches: [main]
    paths:
      - "AppInfo/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        working-directory: AppInfo
        run: mvn test -B

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./AppInfo
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/niveshtrack-appinfo:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/niveshtrack-appinfo:${{ github.sha }}
